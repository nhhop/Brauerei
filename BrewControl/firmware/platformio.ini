[common]
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
build_flags =
  -std=gnu++17
  -DBREWCTL_GITHUB_REPO=\"nhhop/Brauerei\"
build_unflags = -std=gnu++11
extra_scripts = pre:version_flags.py
lib_deps =
  symlink://../../SensActCtrl
  symlink://../../../IdsInductionCooker
  esp32async/ESPAsyncWebServer@^3.1.0
  esp32async/AsyncTCP@^3.2.0

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = ${common.framework}
monitor_speed = ${common.monitor_speed}
monitor_filters = ${common.monitor_filters}
build_flags = ${common.build_flags}
build_unflags = ${common.build_unflags}
extra_scripts = ${common.extra_scripts}
; OTA needs two app slots; the default table's ~1.31 MB slot is >90% full once
; the TLS pull path is linked. min_spiffs.csv gives ~1.9 MB app slots (SPIFFS
; unused — UI assets live on SD). NOTE: first switch to this layout must be
; flashed once over USB; OTA cannot change the partition table.
board_build.partitions = min_spiffs.csv
lib_deps = ${common.lib_deps}

[env:lolin_s2_mini]
platform = espressif32
board = lolin_s2_mini
framework = ${common.framework}
monitor_speed = ${common.monitor_speed}
; S2 has no native exception_decoder support in some PIO versions; keep filters minimal
build_flags =
  ${common.build_flags}
  -DARDUINO_USB_CDC_ON_BOOT=1
build_unflags = ${common.build_unflags}
extra_scripts = ${common.extra_scripts}
; See esp32dev note: 4 MB board, default OTA app slot too tight for the TLS
; pull path. Widen via min_spiffs.csv (one-time USB flash for the swap).
board_build.partitions = min_spiffs.csv
lib_deps = ${common.lib_deps}

; LilyGo T-Display-S3-AMOLED-1.43 (round/square AMOLED variant): ESP32-S3
; dual-core, 16 MB flash, 8 MB OPI PSRAM. The SD slot is on a non-default
; SPI bus; main.cpp picks up these BREWCTL_SD_* macros to drive an
; explicit HSPI instance.
;
; ⚠ Pin choice matters: OPI PSRAM on S3 internally claims GPIO 33–37, so
; SD pins MUST avoid that range. The 1.43 board wires the SD to free pins
; 38/39/40/41 (user-verified from board silkscreen 2026-05-18). An earlier
; attempt with 5/35/36/37 — based on a generic "AMOLED variant" search hit
; that was actually the 1.91 board — caused a TG1 watchdog reset during
; SD.begin because the SPI bus was fighting the PSRAM controller. A later
; attempt with CS=4 (from a search hit citing AMOLED-1.43-1.75) got past
; the crash but the card never answered CMD0 — CS was wrong.
;
; Board: the AMOLED-1.43 has no dedicated PIO board id in espressif32@6.3.2;
; reuse "lilygo-t-display-s3" — same ESP32-S3 chip, same 16 MB flash,
; same qio_opi memory type, same USB-CDC. We don't drive the display,
; so the LCD-vs-AMOLED difference doesn't matter to this firmware.
[env:lilygo_t_display_s3_amoled]
platform = espressif32
board = lilygo-t-display-s3
framework = ${common.framework}
monitor_speed = ${common.monitor_speed}
monitor_filters = ${common.monitor_filters}
build_flags =
  ${common.build_flags}
  -DBOARD_HAS_PSRAM
  -DBREWCTL_SD_CS=38
  -DBREWCTL_SD_SCK=41
  -DBREWCTL_SD_MOSI=39
  -DBREWCTL_SD_MISO=40
  ; Demo-only pins routed off defaults to safe free GPIOs (no DS18B20/SSR
  ; attached on this board anyway). 16 collides with PSRAM-adjacent uses
  ; on some S3 boards; pick low-numbered unused pins.
  -DBREWCTL_ONEWIRE_PIN=1
  -DBREWCTL_SSR_PIN=2
build_unflags = ${common.build_unflags}
extra_scripts = ${common.extra_scripts}
lib_deps = ${common.lib_deps}

[env:native]
platform = native
test_framework = unity
test_build_src = no
build_flags =
  -std=gnu++17
  -DUNIT_TEST
  -Isrc
build_unflags = -std=gnu++11
