; PlatformIO project config for the SensActCtrl library.
;
; The project root is the library itself (library.json + src/). This ini
; only configures the native unit-test environment. ESP32 example builds
; happen via `pio ci`:
;
;   pio ci examples/01_local_twopoint_heater \
;          --lib . --board esp32dev --keep-build-dir
;
; (see README for the full list of examples).

[platformio]

[env:native]
platform = native
test_framework = unity
test_build_src = yes
build_flags =
  -std=gnu++17
  -DUNIT_TEST
  -Isrc
  -Wall
  -Wextra
build_unflags =
  -std=gnu++11
lib_deps =
  bblanchon/ArduinoJson@^7.0.4
